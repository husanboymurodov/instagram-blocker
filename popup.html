<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 12px; color: #ed4956; }
    p  { font-size: 12px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #ed4956; }
    button {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      border: none;
      background: #ed4956;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled { background: #555; cursor: default; }
    #status { font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
    .ok  { color: #4CAF50; }
    .err { color: #ed4956; }
  </style>
</head>
<body>
  <h2>IG Blocker</h2>
  <p>Block by username — tries search API as fallback if they blocked you.</p>
  <input id="username" type="text" placeholder="@username" autocomplete="off" spellcheck="false" />
  <button id="blockBtn">Block by Username</button>
  <div id="status"></div>

  <hr style="border-color:#222; margin:14px 0;" />

  <p style="color:#777;">User ID — auto-filled from username above, or enter manually:</p>
  <input id="userid" type="text" placeholder="User ID (e.g. 77539356504)" autocomplete="off" spellcheck="false" />
  <button id="blockByIdBtn">Block by User ID</button>
  <div id="statusId"></div>
  <script src="popup.js"></script>
</body>
</html>
